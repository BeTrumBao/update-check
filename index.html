async function checkAbnormalMessages() {
  const querySnapshot = await getDocs(collection(db, "communityMessages"));
  
  const timesSeen = new Map(); // dùng Map để lưu timeKey -> doc.id
  const duplicates = [];

  for (const doc of querySnapshot.docs) {
    const data = doc.data();
    if (!data.timestamp) continue;

    const time = data.timestamp.toDate ? data.timestamp.toDate() : new Date(data.timestamp);
    const timeKey = time.toISOString().slice(0, 19); // chuẩn hóa đến giây

    if (timesSeen.has(timeKey)) {
      // lấy doc trước đó bị trùng
      duplicates.push(timesSeen.get(timeKey));
      duplicates.push(doc.id);

      const shouldReport = confirm(`⚠️ Hệ Thống Phát Hiện Lỗi Nội Bộ .\nBạn có muốn gửi Report để xử lý lỗi này một cách nhanh nhất ? Nếu có hãy nhấn "OK" trên hộp thoại !`);
      if (shouldReport) {
        await sendAnomalyReport(timeKey, duplicates);
        alert("✅ Đã gửi báo cáo lỗi thành công. Cảm ơn bạn!");
      }
      return true;
    }

    timesSeen.set(timeKey, doc.id);
  }

  return false;
}

async function sendAnomalyReport(duplicateTimeKey, documentIds) {
  const reportRef = collection(db, "anomalyReports");
  await addDoc(reportRef, {
    reportedAt: new Date(),
    duplicateTimeKey: duplicateTimeKey,
    documentIds: [...new Set(documentIds)],
    reporter: auth.currentUser ? auth.currentUser.email : "anonymous"
  });
}

// Gọi kiểm tra bất thường

    function listenForMessages() {
      const q = query(collection(db, "communityMessages"), orderBy("timestamp", "asc"));
  const shownMessageIds = new Set(); // 👉 Bộ nhớ các ID đã render rồi

    // Hiển thị thanh loading
    const loadingBar = document.getElementById("loadingBar");
    const loadingBarContent = document.getElementById("loadingBarContent");
    loadingBar.style.display = "block";
    loadingBarContent.style.width = "10%"; // Mở đầu thanh loading

  onSnapshot(q, async (snapshot) => {
    const msgPromises = snapshot.docs.map(async (msgDoc) => {
      const data = msgDoc.data();
      const id = msgDoc.id;

      // 👉 Bỏ qua nếu đã hiển thị
      if (shownMessageIds.has(id) || !data.timestamp) return null;

      const userRef = doc(db, "users", data.uid);
      const userDoc = await getDoc(userRef);
      const userData = userDoc.exists() ? userDoc.data() : null;

      return {
        id,
        uid: data.uid,
        name: data.name || "Ẩn danh",
        text: data.text || "",
        timestamp: data.timestamp.toDate(),
        title: userData?.title || "Không có danh hiệu",
      };
    });

    

    const newMessages = (await Promise.all(msgPromises)).filter(Boolean);

    // 👉 Sắp xếp các tin nhắn mới theo thời gian
    newMessages.sort((a, b) => a.timestamp - b.timestamp);

    newMessages.forEach((msg) => {
      const msgDiv = document.createElement("div");
      msgDiv.classList.add("msg");
      msgDiv.classList.add(msg.uid === currentUser.uid ? "msg-right" : "msg-left");

      const avatarUrl = getGravatar(msg.name);

      msgDiv.innerHTML = `
    <img class="msg-avatar" src="${avatarUrl}" alt="avatar" />
    <div class="msg-content">
      <span>
        ${msg.name} 
        <span class="msg-title">${msg.title}</span>
      </span>
      <div class="msg-time">${msg.timestamp.toLocaleString("vi-VN")}</div>
      <div>${linkify(highlightMentions(msg.text))}</div>
    </div>
  `;


      messagesDiv.appendChild(msgDiv);
      shownMessageIds.add(msg.id); // ✅ Đánh dấu đã hiện
    });

    if (newMessages.length > 0) {
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    // Ẩn thanh loading khi hoàn thành
      loadingBarContent.style.width = "100%"; // Hoàn thành
      setTimeout(() => {
        loadingBar.style.display = "none";
      }, 500); // Ẩn thanh loading sau 0.5s
    });

    }

    function linkify(text) {
  const urlRegex = /(https?:\/\/[^\s]+)/g;
  return text.replace(urlRegex, (url) => {
    return `<a href="${url}" target="_blank" style="color: #007bff; text-decoration: underline;">${url}</a>`;
  });
}


    const rulesModal = document.getElementById('rulesModal');
  const rulesContent = document.getElementById('rulesContent');
  const btnAccept = document.getElementById('btnAccept');
  const WEEK_MS = 7 * 24 * 60 * 60 * 1000;

  function showRules() {
    rulesModal.style.display = 'flex';
    btnAccept.disabled = true;
    btnAccept.classList.remove('enabled');
    loadRules();
  }

  function closeRules() {
    rulesModal.style.display = 'none';
  }

  btnAccept.addEventListener('click', () => {
    localStorage.setItem('acceptedRulesTimestamp', Date.now());
    closeRules();
    alert('Cảm ơn bạn đã đồng ý nội quy!');
  });

  rulesContent.addEventListener('scroll', () => {
    // Khi scroll tới đáy => bật nút
    if (rulesContent.scrollTop + rulesContent.clientHeight >= rulesContent.scrollHeight) {
      btnAccept.disabled = false;
      btnAccept.classList.add('enabled');
    }
  });

  async function loadRules() {
    try {
      const res = await fetch('https://betrumbao.github.io/update-check/rules.json');
      const rules = await res.json();
      rulesContent.innerHTML = rules.map((rule, i) => `<p><strong>⚖️ Luật ${i+1}:</strong> ${rule}</p>`).join('');
    } catch(e) {
      rulesContent.innerHTML = '<p>❌ Không thể tải nội quy.</p>';
    }
    checkScroll(); // Kiểm tra trạng thái cuộn khi tải xong
  }

  function checkScroll() {
  if (rulesContent.scrollHeight <= rulesContent.clientHeight) {
    // Nội dung ngắn, bật nút luôn
    btnAccept.disabled = false;
    btnAccept.classList.add('enabled');
  } else {
    // Nội dung dài, cần cuộn mới bật nút
    btnAccept.disabled = true;
    btnAccept.classList.remove('enabled');
  }
}


  window.onload = () => {
    const lastAccepted = localStorage.getItem('acceptedRulesTimestamp');
    if (!lastAccepted || Date.now() - lastAccepted > WEEK_MS) {
      showRules();
    }
  };

  const mentionRegex = /@([\w.-]+@[\w.-]+\.\w+)/g;
  return text.replace(mentionRegex, `<span style="color:#e91e63; font-weight:bold;">@$1</span>`);
}


    const mentionSuggestions = document.getElementById("mentionSuggestions");

messageInput.addEventListener("input", () => {
  const cursorPos = messageInput.selectionStart;
  const textBeforeCursor = messageInput.value.substring(0, cursorPos);
  const atIndex = textBeforeCursor.lastIndexOf("@");

  if (atIndex !== -1) {
    const query = textBeforeCursor.slice(atIndex + 1).toLowerCase();

    const matchedUsers = allUsers.filter(u => u.email.toLowerCase().includes(query));
    if (matchedUsers.length > 0 && query.length > 0) {
      mentionSuggestions.innerHTML = matchedUsers.map(user =>
        `<li style="padding:4px; cursor:pointer;" data-email="${user.email}">${user.email}</li>`
      ).join("");
      const rect = messageInput.getBoundingClientRect();
      mentionSuggestions.style.top = `${rect.bottom + window.scrollY}px`;
      mentionSuggestions.style.left = `${rect.left + window.scrollX}px`;
      mentionSuggestions.style.display = "block";
    } else {
      mentionSuggestions.style.display = "none";
    }
  } else {
    mentionSuggestions.style.display = "none";
  }
});

mentionSuggestions.addEventListener("click", (e) => {
  if (e.target.tagName === "LI") {
    const selectedEmail = e.target.getAttribute("data-email");
    const cursorPos = messageInput.selectionStart;
    const textBeforeCursor = messageInput.value.substring(0, cursorPos);
    const atIndex = textBeforeCursor.lastIndexOf("@");
    const beforeAt = messageInput.value.substring(0, atIndex);
    const afterCursor = messageInput.value.substring(cursorPos);
    messageInput.value = `${beforeAt}@${selectedEmail} ${afterCursor}`;
    mentionSuggestions.style.display = "none";
    messageInput.focus();
  }
});
const sendBtn = document.getElementById("sendBtn");

messageForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const text = messageInput.value.trim();
  if (!text) return;

  // Vô hiệu hóa nút gửi để ngăn spam
  sendBtn.disabled = true;

  try {
    await addDoc(collection(db, "communityMessages"), {
      text,
      uid: currentUser.uid,
      name: currentUser.email,
      timestamp: serverTimestamp()
    });

    messageInput.value = ""; // Xoá nội dung sau khi gửi
  } catch (err) {
    alert("Gửi tin nhắn thất bại!");
    console.error(err);
  }

  // Mở lại nút sau khi gửi xong
  sendBtn.disabled = false;
});
